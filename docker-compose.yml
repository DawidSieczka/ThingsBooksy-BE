services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - postgres__connectionString=Host=postgres;Database=thingsbooksy;Username=postgres;Password=postgres
      - auth__jwt__issuerSigningKey=dev_secret_key_change_in_production_min_32chars
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: thingsbooksy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d thingsbooksy"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
