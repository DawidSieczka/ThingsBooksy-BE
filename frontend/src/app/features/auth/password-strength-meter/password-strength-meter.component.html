@if (password()) {
  <div class="pw-meter" [attr.data-tone]="result().tone">
    <div class="pw-meter__bars" aria-hidden="true">
      @for (i of bars; track i) {
        <span class="pw-meter__bar" [class.pw-meter__bar--filled]="i <= result().score"></span>
      }
    </div>
    <span class="pw-meter__label">{{ result().label }}</span>
  </div>
}
