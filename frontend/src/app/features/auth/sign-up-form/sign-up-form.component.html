<form class="sign-up-form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
  <tb-text-field
    label="Full name"
    icon="user"
    type="text"
    placeholder="Jane Doe"
    autocomplete="name"
    [control]="form.controls.fullName"
    [errorMessages]="fullNameErrorMessages"
  />

  <tb-text-field
    label="Email"
    icon="mail"
    type="email"
    placeholder="you@company.com"
    autocomplete="email"
    [control]="form.controls.email"
    [errorMessages]="emailErrorMessages"
  />

  <div class="sign-up-form__password-group">
    <tb-text-field
      label="Password"
      icon="lock"
      type="password"
      placeholder="Choose a strong password"
      autocomplete="new-password"
      [control]="form.controls.password"
      [errorMessages]="passwordErrorMessages"
    />
    <tb-password-strength-meter [password]="passwordValue()" />
  </div>

  <tb-agree-checkbox [control]="form.controls.agreed" />
  @if (form.controls.agreed.touched && form.controls.agreed.errors?.['agreeRequired']) {
    <span class="sign-up-form__agree-error">
      You must accept the terms to continue.
    </span>
  }

  <button
    type="submit"
    class="sign-up-form__submit"
    [disabled]="isLoading()"
  >
    @if (isLoading()) {
      <span class="sign-up-form__spinner" aria-hidden="true"></span>
      <span>Creating account…</span>
    } @else {
      <span>Create account</span>
    }
  </button>
</form>
