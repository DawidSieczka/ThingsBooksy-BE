<div class="text-field" [class.text-field--invalid]="hasErrors()">
  <label [for]="inputId" class="text-field__label">{{ label() }}</label>
  <div class="text-field__input-wrap">
    <span class="text-field__icon" aria-hidden="true">
      @switch (icon()) {
        @case ('mail') {
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="5" width="18" height="14" rx="2" />
            <path d="m3 7 9 6 9-6" />
          </svg>
        }
        @case ('user') {
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4" />
            <path d="M4 21c0-4 4-7 8-7s8 3 8 7" />
          </svg>
        }
        @case ('lock') {
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="11" width="16" height="10" rx="2" />
            <path d="M8 11V7a4 4 0 0 1 8 0v4" />
          </svg>
        }
      }
    </span>
    <input
      [id]="inputId"
      class="text-field__input"
      [type]="effectiveType()"
      [placeholder]="placeholder()"
      [autocomplete]="autocomplete()"
      [formControl]="control()"
    />
    @if (canTogglePassword()) {
      <button
        type="button"
        class="text-field__toggle"
        [attr.aria-label]="showingPassword() ? 'Hide password' : 'Show password'"
        (click)="togglePassword()"
      >
        @if (showingPassword()) {
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 3 18 18" />
            <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8" />
            <path d="M9.9 5.1A10.9 10.9 0 0 1 12 5c7 0 10 7 10 7a17.6 17.6 0 0 1-3.1 4.2" />
            <path d="M6.6 6.6A17.6 17.6 0 0 0 2 12s3 7 10 7a10.9 10.9 0 0 0 4.4-.9" />
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7S2 12 2 12Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        }
      </button>
    }
  </div>
  @if (hasErrors()) {
    <ul class="text-field__errors">
      @for (msg of errors(); track msg) {
        <li>{{ msg }}</li>
      }
    </ul>
  }
</div>
