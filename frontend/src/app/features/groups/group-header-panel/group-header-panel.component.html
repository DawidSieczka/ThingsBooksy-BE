<article class="group-header-panel" aria-labelledby="group-heading">
  <div class="group-header-panel__content">
    <div class="group-header-panel__left">
      <tb-avatar
        [id]="avatarId()"
        [initials]="avatarInitials()"
        size="lg"
      />

      <div class="group-header-panel__info">
        <h1
          id="group-heading"
          class="group-header-panel__name"
        >{{ groupName() }}</h1>

        @if (groupDescription()) {
          <p class="group-header-panel__description">{{ groupDescription() }}</p>
        }

        <div class="group-header-panel__meta" role="list" aria-label="Group details">
          <span class="group-header-panel__chip" role="listitem">
            <svg
              class="group-header-panel__chip-icon"
              width="12"
              height="12"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span>Created {{ createdAtFormatted() }}</span>
          </span>

          <span class="group-header-panel__chip" role="listitem">
            <svg
              class="group-header-panel__chip-icon"
              width="12"
              height="12"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            <span>{{ membersLabel() }}</span>
          </span>

          <span class="group-header-panel__chip" role="listitem">
            <svg
              class="group-header-panel__chip-icon"
              width="12"
              height="12"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
            </svg>
            <span>{{ resourceCount() }} resources</span>
          </span>
        </div>
      </div>
    </div>

    @if (isOwner()) {
      <div class="group-header-panel__actions">
        <button
          type="button"
          class="group-header-panel__btn group-header-panel__btn--edit"
          aria-label="Edit group"
          (click)="onEdit()"
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
          Edit
        </button>

        <button
          type="button"
          class="group-header-panel__btn group-header-panel__btn--delete"
          aria-label="Delete group"
          (click)="onDelete()"
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
            <path d="M10 11v6"></path>
            <path d="M14 11v6"></path>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
          </svg>
          Delete
        </button>
      </div>
    }
  </div>
</article>
